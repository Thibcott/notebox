<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <base href="/notebox/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notebox - Tâches</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗒️</text></svg>">
  <link rel="stylesheet" href="/notebox/styles.css" />
  <style>
    .task-list { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
    .task-item { display: flex; align-items: center; justify-content: space-between; background: #252526; padding: 12px 16px; border-radius: 6px; border: 1px solid #333333; }
    .task-item.completed { opacity: 0.6; }
    .task-item.completed .task-title { text-decoration: line-through; }
    .task-title { flex: 1; margin-left: 12px; font-size: 15px; }
    .task-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #0078d4; }
    .theme-light .task-item { background: #f9f9f9; border-color: #dddddd; }
    
    .add-task-row { display: flex; gap: 8px; padding: 20px; border-bottom: 1px solid #333333; }
    .theme-light .add-task-row { border-color: #dddddd; }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🗒️</div>
        <div>
          <div class="title">Notebox</div>
          <div class="subtitle">Notes • Images • Code</div>
        </div>
      </div>

      <nav class="main-nav">
        <a href="/notebox/" class="nav-item">📝 Notes</a>
        <a href="/notebox/time.html" class="nav-item">⏱️ Timbreuse</a>
        <a href="/notebox/tasks.html" class="nav-item active">☑️ Tâches</a>
      </nav>

      <hr class="nav-sep" />

      <div id="projects" class="projects"></div>
      
      <div class="footer">
        <div class="small">Info</div>
        <ul>
          <li>Sélectionnez un projet pour voir ses tâches associées.</li>
          <li>Les tâches sont liées à vos notes par projet.</li>
        </ul>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="crumbs">
          <button id="btnToggleSidebar" class="mobile-only">☰</button>
          <span class="title" style="font-weight:600; font-size:18px;">Tâches - <span id="currentProjectName">—</span></span>
        </div>
      </header>

      <section class="work" style="flex-direction: column;">
        <div class="add-task-row">
          <input id="newTaskTitle" placeholder="Ajouter une tâche (Entrée pour valider)..." />
          <button id="btnAddTask">Ajouter</button>
        </div>
        
        <div id="taskList" class="task-list" style="flex: 1; overflow-y: auto;">
           <!-- Tasks rendered here -->
        </div>
      </section>
    </main>
  </div>

  <script src="tasks.js"></script>
</body>

</html>
